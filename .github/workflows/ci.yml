name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: rag
        ports: [5432:5432]
        options: >-
          --health-cmd="pg_isready -U app -d rag"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Apply migrations
        run: |
          sudo apt-get update && sudo apt-get install -y postgresql-client
          psql "postgres://app:app@localhost:5432/rag" -f migrations/001_init.sql

      - name: Lint
        run: ruff check src tests --fix

      - name: Test
        env:
          POSTGRES_URL: postgres://app:app@localhost:5432/rag
        run: pytest -q --cov=agentic_rag_mcp
